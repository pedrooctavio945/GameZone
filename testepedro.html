<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameZone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(180deg,#000000,#ffffff);
    min-height:100vh;
}

/* TOPO */

header{
    background:#424443;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logo{
    color:white;
    font-size:38px;
    font-weight:bold;
}

/* PESQUISA */

.top-search{
    padding:20px;
}

.search-box{
    width:320px;
    padding:14px;
    border:none;
    border-radius:30px;
    font-size:16px;
    outline:none;
}

/* CATEGORIAS */

.categories{
    display:flex;
    gap:12px;
    padding:0 20px 20px;
    flex-wrap:wrap;
}

.category-btn{
    border:none;
    padding:12px 18px;
    border-radius:30px;
    background:white;
    color:#000000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.category-btn:hover{
    background:#ffe600;
    transform:scale(1.05);
}

/* GRADE DOS JOGOS */

.games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD DOS JOGOS */

.game-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.game-card:hover{
    transform:translateY(-8px) scale(1.03);
}

.game-card img{
    width:100%;
    height:170px;
    object-fit:cover;
    filter: brightness(0) saturate(100%);
    background-color:#000;
    text-align:center;
}

.game-info h3{
    margin:0 0 12px;
    color:#333;
    text-align:center;
}

/* BOTÃO */

.play-btn{
    display:block;
    width:max-content;
    margin:10px auto 0;
    background:#646665;
    color:white;
    padding:10px 18px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s transform, 0.3s box-shadow, 0.3s background;
    box-shadow:0 12px 20px rgba(0,0,0,0.2);
    transform:translateY(-4px);
}

.play-btn:hover{
    background:hwb(150 20% 79%);
    transform:translateY(-6px);
    box-shadow:0 16px 28px rgba(0,0,0,0.25);
}

/* RODAPÉ */

footer{
    margin-top:30px;
    background:#373838;
    color:white;
    text-align:center;
    padding:20px;
}

/* RESPONSIVO */

@media(max-width:768px){

    .search-box{
        width:100%;
    }

}

</style>

</head>

<body>

<footer>

© 2026 GameZone - Todos os direitos reservados

</footer>

<script>

/* PESQUISA */

const searchInput = document.getElementById('searchInput');

const gameCards = document.querySelectorAll('.game-card');

searchInput.addEventListener('keyup', () => {

    const value = searchInput.value.toLowerCase();

    gameCards.forEach(card => {

        const title = card.querySelector('h3')
        .textContent.toLowerCase();

        if(title.includes(value)){

            card.style.display = 'block';

        }else{

            card.style.display = 'none';

        }

    });

});

</script>
